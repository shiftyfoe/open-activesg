<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ActiveSG Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --green: #22c55e;
      --yellow: #f59e0b;
      --orange: #f97316;
      --red: #ef4444;
      --accent: #38bdf8;
      --accent-gym: #a78bfa;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    header {
      padding: 24px 20px 16px;
      border-bottom: 1px solid var(--border);
      max-width: 1400px;
      margin: 0 auto;
    }

    header h1 { font-size: 22px; font-weight: 700; color: var(--accent); }
    header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

    /* ── facility tabs ── */
    .tab-bar {
      max-width: 1400px;
      margin: 0 auto;
      padding: 16px 20px 0;
      display: flex;
      gap: 4px;
      border-bottom: 1px solid var(--border);
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      padding: 8px 18px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: var(--text); }
    .tab-btn.active[data-tab="pool"] { color: var(--accent); border-bottom-color: var(--accent); }
    .tab-btn.active[data-tab="gym"]  { color: var(--accent-gym); border-bottom-color: var(--accent-gym); }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .main { max-width: 1400px; margin: 0 auto; padding: 20px; }

    /* ── section ── */
    .section { margin-bottom: 36px; }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      cursor: default;
    }

    .card.closed { opacity: .45; }

    .card-name {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-pct {
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 8px;
    }

    .card-bar-track {
      height: 4px;
      border-radius: 2px;
      background: var(--surface2);
      overflow: hidden;
    }

    .card-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width .4s ease;
    }

    .card-closed-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    /* ── chart containers ── */
    .chart-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
    }

    .chart-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    select, button {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 10px;
      font-size: 13px;
      cursor: pointer;
    }

    select:focus, button:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    button.active {
      background: var(--accent);
      color: #0f172a;
      border-color: var(--accent);
      font-weight: 600;
    }

    .range-btns { display: flex; gap: 4px; }

    canvas { display: block; width: 100% !important; }

    /* ── status bar ── */
    #status {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 16px;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      padding: 40px 0;
      justify-content: center;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 780px) {
      .two-col { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <h1>ActiveSG Tracker</h1>
  <p id="header-sub">Loading…</p>
</header>

<div class="tab-bar">
  <button class="tab-btn active" data-tab="pool">Pools</button>
  <button class="tab-btn" data-tab="gym">Gyms</button>
</div>

<!-- ══════════ POOLS TAB ══════════ -->
<div id="tab-pool" class="tab-panel active">
  <div class="main">
    <div id="pool-status" class="section" style="margin-bottom:0;"></div>

    <div class="section">
      <div class="section-title">Latest Snapshot</div>
      <div id="pool-cards-container">
        <div class="loading"><div class="spinner"></div> Fetching data…</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Capacity Over Time</div>
      <div class="chart-box">
        <div class="chart-controls">
          <select id="pool-ts-select"><option value="__all__">— All pools (average) —</option></select>
          <div class="range-btns" id="pool-range-btns">
            <button class="range-btn active" data-days="7">7d</button>
            <button class="range-btn" data-days="30">30d</button>
            <button class="range-btn" data-days="90">90d</button>
            <button class="range-btn" data-days="0">All</button>
          </div>
        </div>
        <canvas id="pool-ts-chart" height="260"></canvas>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Usage Patterns (SGT)</div>
      <div class="chart-controls" style="margin-bottom:12px;">
        <select id="pool-pat-select"><option value="__all__">— All pools (average) —</option></select>
      </div>
      <div class="two-col">
        <div class="chart-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Average by Hour of Day</div>
          <canvas id="pool-hour-chart" height="220"></canvas>
        </div>
        <div class="chart-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Average by Day of Week</div>
          <canvas id="pool-dow-chart" height="220"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══════════ GYMS TAB ══════════ -->
<div id="tab-gym" class="tab-panel">
  <div class="main">
    <div id="gym-status" class="section" style="margin-bottom:0;"></div>

    <div class="section">
      <div class="section-title">Latest Snapshot</div>
      <div id="gym-cards-container">
        <div class="loading"><div class="spinner"></div> Fetching data…</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Capacity Over Time</div>
      <div class="chart-box">
        <div class="chart-controls">
          <select id="gym-ts-select"><option value="__all__">— All gyms (average) —</option></select>
          <div class="range-btns" id="gym-range-btns">
            <button class="range-btn active" data-days="7">7d</button>
            <button class="range-btn" data-days="30">30d</button>
            <button class="range-btn" data-days="90">90d</button>
            <button class="range-btn" data-days="0">All</button>
          </div>
        </div>
        <canvas id="gym-ts-chart" height="260"></canvas>
      </div>
    </div>

    <div class="section">
      <div class="section-title">Usage Patterns (SGT)</div>
      <div class="chart-controls" style="margin-bottom:12px;">
        <select id="gym-pat-select"><option value="__all__">— All gyms (average) —</option></select>
      </div>
      <div class="two-col">
        <div class="chart-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Average by Hour of Day</div>
          <canvas id="gym-hour-chart" height="220"></canvas>
        </div>
        <div class="chart-box">
          <div style="font-size:12px;color:var(--muted);margin-bottom:10px;">Average by Day of Week</div>
          <canvas id="gym-dow-chart" height="220"></canvas>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const REPO = 'shiftyfoe/open-activesg';
const RAW  = `https://raw.githubusercontent.com/${REPO}/main/data`;

// ── Utilities ──────────────────────────────────────────────────────────────

function capacityColor(pct) {
  if (pct <= 20) return '#22c55e';
  if (pct <= 50) return '#f59e0b';
  if (pct <= 75) return '#f97316';
  return '#ef4444';
}

function toSGT(ts) { return new Date(ts + 8 * 3600_000); }
function sgtHour(ts) { return toSGT(ts).getUTCHours(); }
function sgtDow(ts)  { return toSGT(ts).getUTCDay(); }

function avgOpen(items) {
  const open = items.filter(p => !p.is_closed);
  if (!open.length) return 0;
  return open.reduce((s, p) => s + p.capacity_pct, 0) / open.length;
}

function fmtTime(ts) {
  return toSGT(ts).toLocaleString('en-SG', {
    timeZone: 'UTC',
    month: 'short', day: 'numeric',
    hour: '2-digit', minute: '2-digit',
    hour12: false
  });
}

function shortName(name) {
  return name
    .replace('Swimming Complex', '')
    .replace('ActiveSG Sport Park @ ', '')
    .replace('ActiveSG Gym @ ', '')
    .replace('ActiveSG Gym', '')
    .replace('ActiveSG ', '')
    .replace(' Complex', '')
    .replace(' ActiveSG Gym', '')
    .trim();
}

// ── Data loading ───────────────────────────────────────────────────────────

function monthsToTry() {
  const out = [];
  const now = new Date();
  for (let i = 0; i < 14; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    out.push(d.toISOString().slice(0, 7));
  }
  return out;
}

async function fetchMonth(month) {
  try {
    const res = await fetch(`${RAW}/${month}.jsonl`, { cache: 'no-cache' });
    if (!res.ok) return [];
    const text = await res.text();
    return text.trim().split('\n').filter(Boolean).map(line => {
      try { return JSON.parse(line); } catch { return null; }
    }).filter(Boolean);
  } catch { return []; }
}

// ── Chart helpers ──────────────────────────────────────────────────────────

Chart.defaults.color = '#94a3b8';
Chart.defaults.borderColor = '#334155';
Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
Chart.defaults.font.size = 12;

const charts = {};

function buildTsDataset(records, key, itemId, days) {
  const cutoff = days > 0 ? Date.now() - days * 86400_000 : 0;
  const filtered = records.filter(r => r.timestamp >= cutoff && r[key]?.length);
  if (!filtered.length) return { labels: [], data: [] };

  return {
    labels: filtered.map(r => fmtTime(r.timestamp)),
    data: filtered.map(r => {
      if (itemId === '__all__') return parseFloat(avgOpen(r[key]).toFixed(1));
      const p = r[key].find(x => x.id === itemId);
      return p && !p.is_closed ? p.capacity_pct : null;
    })
  };
}

function renderTsChart(chartId, records, key, itemId, days, names, accentColor) {
  const { labels, data } = buildTsDataset(records, key, itemId, days);
  const ctx = document.getElementById(chartId);
  if (charts[chartId]) { charts[chartId].destroy(); }

  charts[chartId] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: itemId === '__all__' ? 'Average capacity %' : (names[itemId] || itemId),
        data,
        borderColor: accentColor,
        backgroundColor: accentColor + '14',
        borderWidth: 2,
        pointRadius: labels.length < 40 ? 3 : 0,
        pointHoverRadius: 5,
        spanGaps: true,
        fill: true,
        tension: 0.3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.parsed.y !== null ? c.parsed.y.toFixed(1) + '%' : 'Closed'}` } }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, maxRotation: 0 }, grid: { color: '#1e293b' } },
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#1e293b' } }
      }
    }
  });
  ctx.parentElement.style.height = '260px';
}

function buildPatternDatasets(records, key, itemId) {
  const hourBuckets = Array.from({ length: 24 }, () => ({ sum: 0, n: 0 }));
  const dowBuckets  = Array.from({ length: 7  }, () => ({ sum: 0, n: 0 }));

  records.forEach(r => {
    if (!r[key]?.length) return;
    const val = itemId === '__all__'
      ? avgOpen(r[key])
      : (() => { const p = r[key].find(x => x.id === itemId); return p && !p.is_closed ? p.capacity_pct : null; })();
    if (val === null || val === undefined) return;

    const h = sgtHour(r.timestamp);
    const d = sgtDow(r.timestamp);
    hourBuckets[h].sum += val; hourBuckets[h].n++;
    dowBuckets[d].sum  += val; dowBuckets[d].n++;
  });

  return {
    hourData: hourBuckets.map(b => b.n ? parseFloat((b.sum / b.n).toFixed(1)) : null),
    dowData:  dowBuckets.map (b => b.n ? parseFloat((b.sum / b.n).toFixed(1)) : null),
  };
}

function renderPatternCharts(hourId, dowId, records, key, itemId) {
  const { hourData, dowData } = buildPatternDatasets(records, key, itemId);
  const hourLabels = Array.from({ length: 24 }, (_, i) => `${String(i).padStart(2,'0')}:00`);
  const dowLabels  = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  const barOpts = (labels, data) => ({
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: data.map(v => v === null ? '#334155' : capacityColor(v) + 'cc'),
        borderColor:      data.map(v => v === null ? '#475569' : capacityColor(v)),
        borderWidth: 1,
        borderRadius: 3,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: c => ` ${c.parsed.y !== null ? c.parsed.y.toFixed(1) + '%' : 'No data'}` } }
      },
      scales: {
        x: { grid: { display: false } },
        y: { min: 0, max: 100, ticks: { callback: v => v + '%' }, grid: { color: '#1e293b' } }
      }
    }
  });

  [hourId, dowId].forEach(id => { if (charts[id]) charts[id].destroy(); });
  charts[hourId] = new Chart(document.getElementById(hourId), barOpts(hourLabels, hourData));
  charts[dowId]  = new Chart(document.getElementById(dowId),  barOpts(dowLabels,  dowData));
  document.getElementById(hourId).parentElement.style.height = '220px';
  document.getElementById(dowId).parentElement.style.height  = '220px';
}

// ── Cards ──────────────────────────────────────────────────────────────────

function renderCards(containerId, items) {
  const sorted = [...items].sort((a, b) => {
    if (a.is_closed !== b.is_closed) return a.is_closed ? 1 : -1;
    return b.capacity_pct - a.capacity_pct;
  });

  const html = sorted.map(p => {
    const color = capacityColor(p.capacity_pct);
    const pct   = p.capacity_pct;
    if (p.is_closed) {
      return `<div class="card closed">
        <div class="card-name" title="${p.name}">${shortName(p.name)}</div>
        <div class="card-closed-label">Closed</div>
      </div>`;
    }
    return `<div class="card">
      <div class="card-name" title="${p.name}">${shortName(p.name)}</div>
      <div class="card-pct" style="color:${color}">${pct}%</div>
      <div class="card-bar-track">
        <div class="card-bar-fill" style="width:${pct}%;background:${color}"></div>
      </div>
    </div>`;
  }).join('');

  document.getElementById(containerId).innerHTML = `<div class="cards">${html}</div>`;
}

// ── Selects ────────────────────────────────────────────────────────────────

function populateSelect(selectId, items, allLabel) {
  const names = {};
  items.forEach(p => { names[p.id] = p.name; });
  const sorted = [...items].sort((a, b) => a.name.localeCompare(b.name));
  const opts = sorted.map(p => `<option value="${p.id}">${shortName(p.name)}</option>`).join('');
  document.getElementById(selectId).innerHTML =
    `<option value="__all__">${allLabel}</option>` + opts;
  return names;
}

// ── Tab switching ──────────────────────────────────────────────────────────

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = btn.dataset.tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(`tab-${tab}`).classList.add('active');
  });
});

// ── Boot ───────────────────────────────────────────────────────────────────

let allRecords = [];
let poolNames  = {};
let gymNames   = {};
let poolDays   = 7;
let gymDays    = 7;

async function init() {
  const months = monthsToTry();
  const chunks = await Promise.all(months.map(fetchMonth));
  allRecords = chunks.flat().sort((a, b) => a.timestamp - b.timestamp);

  if (!allRecords.length) {
    document.getElementById('pool-cards-container').innerHTML =
      '<p style="color:var(--muted);padding:20px 0">No data found.</p>';
    document.getElementById('gym-cards-container').innerHTML =
      '<p style="color:var(--muted);padding:20px 0">No data found.</p>';
    return;
  }

  const latest = allRecords[allRecords.length - 1];
  const first  = allRecords[0];
  const count  = allRecords.length;
  const subText = `${count} snapshots · ${fmtTime(first.timestamp)} → ${fmtTime(latest.timestamp)} SGT`;

  document.getElementById('header-sub').textContent = subText;

  // ── Pools ──
  if (latest.pools?.length) {
    poolNames = populateSelect('pool-ts-select', latest.pools, '— All pools (average) —');
    populateSelect('pool-pat-select', latest.pools, '— All pools (average) —');
    renderCards('pool-cards-container', latest.pools);
    renderTsChart('pool-ts-chart', allRecords, 'pools', '__all__', poolDays, poolNames, '#38bdf8');
    renderPatternCharts('pool-hour-chart', 'pool-dow-chart', allRecords, 'pools', '__all__');
  }

  // ── Gyms ──
  const gymRecords = allRecords.filter(r => r.gyms?.length);
  if (latest.gyms?.length) {
    gymNames = populateSelect('gym-ts-select', latest.gyms, '— All gyms (average) —');
    populateSelect('gym-pat-select', latest.gyms, '— All gyms (average) —');
    renderCards('gym-cards-container', latest.gyms);
    renderTsChart('gym-ts-chart', gymRecords, 'gyms', '__all__', gymDays, gymNames, '#a78bfa');
    renderPatternCharts('gym-hour-chart', 'gym-dow-chart', gymRecords, 'gyms', '__all__');
  } else {
    document.getElementById('gym-cards-container').innerHTML =
      '<p style="color:var(--muted);padding:20px 0">No gym data yet — will appear after the next collection run.</p>';
  }

  // ── Pool controls ──
  document.querySelectorAll('#pool-range-btns .range-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#pool-range-btns .range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      poolDays = parseInt(btn.dataset.days, 10);
      renderTsChart('pool-ts-chart', allRecords, 'pools', document.getElementById('pool-ts-select').value, poolDays, poolNames, '#38bdf8');
    });
  });

  document.getElementById('pool-ts-select').addEventListener('change', e => {
    renderTsChart('pool-ts-chart', allRecords, 'pools', e.target.value, poolDays, poolNames, '#38bdf8');
  });

  document.getElementById('pool-pat-select').addEventListener('change', e => {
    renderPatternCharts('pool-hour-chart', 'pool-dow-chart', allRecords, 'pools', e.target.value);
  });

  // ── Gym controls ──
  document.querySelectorAll('#gym-range-btns .range-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#gym-range-btns .range-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      gymDays = parseInt(btn.dataset.days, 10);
      renderTsChart('gym-ts-chart', gymRecords, 'gyms', document.getElementById('gym-ts-select').value, gymDays, gymNames, '#a78bfa');
    });
  });

  document.getElementById('gym-ts-select').addEventListener('change', e => {
    renderTsChart('gym-ts-chart', gymRecords, 'gyms', e.target.value, gymDays, gymNames, '#a78bfa');
  });

  document.getElementById('gym-pat-select').addEventListener('change', e => {
    renderPatternCharts('gym-hour-chart', 'gym-dow-chart', gymRecords, 'gyms', e.target.value);
  });
}

init();
</script>
</body>
</html>
