name: collect pool & gym capacity

on:
  schedule:
    # 6 jobs/day every 3h covering SGT opening hours (6am–9pm = 22:00–13:00 UTC)
    - cron: "0 22,1,4,7,10,13 * * *"
  workflow_dispatch: # manual trigger for testing

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        run: npx playwright install chrome --with-deps

      - name: Start virtual display
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1280x720x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Collect pool & gym capacity (5x every 30 min)
        run: |
          for i in 1 2 3 4 5; do
            node collect.js
            git add data/
            if ! git diff --cached --quiet; then
              git commit -m "data: pool & gym capacity $(date -u +%Y-%m-%dT%H:%MZ)"
              git push
            fi
            [ $i -lt 5 ] && sleep 1800
          done
